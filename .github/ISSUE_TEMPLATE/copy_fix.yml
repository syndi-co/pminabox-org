name: Copy fix
description: Suggest a typo fix, wording change, or copy improvement
labels: [copy]
body:
  - type: textarea
    id: whats-wrong
    attributes:
      label: What needs fixing?
      description: Quote the current text and describe what should change.
    validations:
      required: true
  - type: textarea
    id: suggested-fix
    attributes:
      label: Suggested replacement
      description: Optional — paste the corrected text if you have it.
    validations:
      required: false
