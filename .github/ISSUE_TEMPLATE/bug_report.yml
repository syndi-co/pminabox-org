name: Bug report
description: Report something broken on the site
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe what you were doing and what went wrong.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: false
  - type: input
    id: browser
    attributes:
      label: Browser & OS
      placeholder: e.g. Chrome 130 on macOS 15
    validations:
      required: false
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Paste or drag screenshots if helpful.
    validations:
      required: false
