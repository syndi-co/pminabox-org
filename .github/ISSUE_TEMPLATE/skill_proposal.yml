name: Skill proposal
description: Propose a new skill or plugin for the registry
labels: [skill-proposal]
body:
  - type: input
    id: skill-name
    attributes:
      label: Skill name
      placeholder: e.g. "Maintenance ticket triage"
    validations:
      required: true
  - type: textarea
    id: what-it-does
    attributes:
      label: What does this skill do?
      description: One or two sentences from the operator's perspective.
    validations:
      required: true
  - type: textarea
    id: data-handling
    attributes:
      label: What data does it touch?
      description: What PMS data does it read/write? Does any data leave the operator's infrastructure?
    validations:
      required: false
  - type: input
    id: partner
    attributes:
      label: Who is building this?
      placeholder: Company name or individual
    validations:
      required: false
